server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression untuk performa lebih cepat
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Routing untuk Vue SPA (Single Page Application)
    # Jika file tidak ditemukan, arahkan kembali ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy untuk Backend API
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy untuk file uploads (gambar logo, dll)
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # Cache untuk static assets (gambar, css, js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        log_not_found off;
    }
}
